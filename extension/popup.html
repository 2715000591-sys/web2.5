<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>web2.5</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <p class="eyebrow">web2.5 MVP</p>
      <h1>内容控制</h1>
      <div class="feature-card control-card">
        <label class="toggle">
          <input id="enabled" type="checkbox">
          <span>开启 X 回复区清理</span>
        </label>
        <label id="markingToggleRow" class="toggle toggle-sub">
          <input id="markingEnabled" type="checkbox">
          <span>回复下方显示“标记可疑”</span>
        </label>
        <p id="cleanupStatus" class="hint compact-hint">
          只在帖子详情页生效。
        </p>
      </div>
      <div class="feature-card feature-card-separated">
        <label class="toggle">
          <input id="sidebarControlsEnabled" type="checkbox">
          <span>开启右栏模块关闭按钮</span>
        </label>
        <p id="sidebarControlsStatus" class="hint compact-hint">
          官网和插件会尽量同步这个偏好。
        </p>
      </div>
      <div class="sync-card">
        <p class="sync-title">云端账号</p>
        <div class="sync-status-row">
          <span>服务</span>
          <strong id="serviceStatusValue">官方云端</strong>
        </div>
        <div class="sync-status-row">
          <span>账号</span>
          <strong id="accountStatusValue">正在检查...</strong>
        </div>
        <div class="action-row">
          <a id="openConsole" class="action-link" href="https://web25-public.web25-boris.workers.dev" target="_blank" rel="noreferrer">打开控制台</a>
        </div>
        <p id="syncStatus" class="hint compact-hint">
          登录后自动接上。
        </p>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
