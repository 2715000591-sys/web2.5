<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>web2.5</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <p class="eyebrow">web2.5 MVP</p>
      <h1>回复区清理</h1>
      <label class="toggle">
        <input id="enabled" type="checkbox">
        <span>开启 X 回复区清理</span>
      </label>
      <label class="toggle">
        <input id="markingEnabled" type="checkbox">
        <span>开启“标记可疑”模式</span>
      </label>
      <p class="hint">
        只在单条帖子详情页生效。关闭标记模式时，页面里不会出现“标记可疑”按钮。
      </p>
      <p class="hint">
        开启标记模式后，“标记可疑”会出现在回复下方，不再挡住 X 原生按钮。
      </p>
      <div class="sync-card">
        <p class="sync-title">云端控制台</p>
        <label class="field">
          <span>服务地址</span>
          <input id="backendBaseUrl" type="text" placeholder="https://web25-public.web25-boris.workers.dev 或你自己的地址">
        </label>
        <div class="sync-status-row">
          <span>账号状态</span>
          <strong id="accountStatusValue">正在检查...</strong>
        </div>
        <div class="action-row">
          <a id="openConsole" class="action-link" href="https://web25-public.web25-boris.workers.dev" target="_blank" rel="noreferrer">打开控制台</a>
        </div>
        <p id="syncStatus" class="hint compact-hint">
          登录账号后，当前设备会自动接入控制台，不需要手动复制任何东西。
        </p>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
